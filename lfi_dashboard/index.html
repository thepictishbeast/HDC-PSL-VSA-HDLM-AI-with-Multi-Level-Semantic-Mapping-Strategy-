<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Fonts: DM Sans + JetBrains Mono. Per Bible §4.3 (PSA): no Google
         CDN. Self-host when woff2 files are available locally; until then,
         the font stack falls through to system sans-serif. -->
    <!-- c2-284: removed maximum-scale + user-scalable=no — WCAG 2.1 §1.4.4
         requires users be able to zoom up to 200%. Low-vision users were
         blocked from pinch-zoom, which failed accessibility audit. Keep
         initial-scale=1 so the page still renders at normal size on first
         load. viewport-fit=cover extends the canvas under the notch on
         iPhones; the safe-area-inset paddings we already have protect
         interactive regions. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PlausiDen AI</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0C0C14" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />
    <!-- Tell the browser both schemes are supported so form controls and
         native scrollbars pick the right palette for the current theme. -->
    <meta name="color-scheme" content="dark light" />
    <meta name="description" content="Sovereign neurosymbolic AI dashboard — chat, research, reasoning traces, live training telemetry." />
    <meta name="robots" content="noindex" />
    <!-- c2-276: inline SVG favicon — no extra request, and the app can swap
         href at runtime to badge an unread-reply dot. No CDN per PSA §4.3. -->
    <link id="favicon" rel="icon" type="image/svg+xml"
      href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2212%22%20fill%3D%22%238b7bf7%22%2F%3E%3Ctext%20x%3D%2232%22%20y%3D%2245%22%20text-anchor%3D%22middle%22%20font-family%3D%22system-ui%22%20font-size%3D%2240%22%20font-weight%3D%22700%22%20fill%3D%22%23fff%22%3EP%3C%2Ftext%3E%3C%2Fsvg%3E" />
    <!-- c2-294: apple-touch-icon reuses the same SVG. iOS Safari honours it
         when users Add to Home Screen. application-name feeds into
         Microsoft tile + desktop PWA manifests as the short display name. -->
    <link rel="apple-touch-icon" type="image/svg+xml"
      href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2212%22%20fill%3D%22%238b7bf7%22%2F%3E%3Ctext%20x%3D%2232%22%20y%3D%2245%22%20text-anchor%3D%22middle%22%20font-family%3D%22system-ui%22%20font-size%3D%2240%22%20font-weight%3D%22700%22%20fill%3D%22%23fff%22%3EP%3C%2Ftext%3E%3C%2Fsvg%3E" />
    <meta name="application-name" content="PlausiDen AI" />
    <meta name="apple-mobile-web-app-title" content="PlausiDen" />
    <!-- c2-381 / BIG #177: PWA manifest wired. install prompt becomes
         eligible once the SW registers + the manifest loads successfully. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- c2-295: Eruda CDN load is now gated by the user's erudaMode setting.
         Unconditional inclusion cost every user ~36KB network + CDN call on
         every load — violates PSA §4.3 no-CDN policy for non-dev users.
         When the setting says "show Eruda for this session", we inject the
         script tag dynamically; otherwise the CDN is never hit. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('lfi_settings');
          var mode = 'auto';
          if (raw) {
            var s = JSON.parse(raw);
            if (s && typeof s.erudaMode === 'string') mode = s.erudaMode;
          }
          var isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
          var shouldShow = mode === 'on' || (mode === 'auto' && isMobile);
          if (!shouldShow) return;
          var tag = document.createElement('script');
          tag.src = 'https://cdn.jsdelivr.net/npm/eruda';
          tag.onload = function () { try { window.eruda && window.eruda.init(); } catch (_) { /* non-fatal */ } };
          tag.onerror = function () { /* offline or blocked — user just won't have Eruda */ };
          document.head.appendChild(tag);
        } catch (e) { /* non-fatal */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
