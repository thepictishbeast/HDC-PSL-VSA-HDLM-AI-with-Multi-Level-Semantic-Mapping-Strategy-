<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Maskable variant: full-bleed background so safe-area cropping
       (Android adaptive icons) doesn't clip the P. Glyph shrunk to the
       recommended 80% safe zone radius. -->
  <rect x="0" y="0" width="128" height="128" fill="#3b82f6"/>
  <text x="64" y="84" font-family="system-ui, -apple-system, sans-serif"
        font-size="64" font-weight="800" fill="#ffffff"
        text-anchor="middle">P</text>
</svg>
